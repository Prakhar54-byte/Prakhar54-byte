name: Update Profile Widgets

on:
  schedule:
    - cron: "0 0 * * *"   # runs once daily at midnight UTC
  workflow_dispatch:        # lets you trigger it manually from the Actions tab
  push:
    branches: [main]

jobs:
  snake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate snake animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Prakhar54-byte
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push snake SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trophy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch trophy SVG (runs once a day, not on every profile view)
        run: curl -sL "https://github-profile-trophy.vercel.app/?username=Prakhar54-byte&theme=tokyonight&no-frame=true&row=1&column=7" -o trophy.svg

      - name: Commit trophy.svg to repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh trophy svg"
          file_pattern: trophy.svg
