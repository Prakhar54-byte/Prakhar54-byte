name: Update Profile Widgets

on:
  schedule:
    - cron: "0 0 * * *"   # runs once daily at midnight UTC
  workflow_dispatch:        # lets you trigger it manually from the Actions tab

concurrency:
  group: profile-widgets
  cancel-in-progress: false

jobs:
  snake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate snake animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Prakhar54-byte
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push snake SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trophy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate trophy SVG locally (no external server, uses your own API quota)
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: Prakhar54-byte
          output_path: trophy.svg
          theme: onedark
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest before committing (avoid race with other runs)
        run: git pull --rebase --autostash origin main

      - name: Commit trophy.svg to repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh trophy svg"
          file_pattern: trophy.svg
